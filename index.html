<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little Universe ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#07071d,#14052d,#000);
overflow:hidden;
color:white;
text-align:center;
}

h1{
font-size:55px;
color:#ff8ad8;
text-shadow:0 0 20px #ff4da6;
}

h2{
margin-top:15px;
font-size:28px;
font-weight:normal;
}

button{
margin-top:40px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff4da6;
color:white;
cursor:pointer;
transition:.4s;
box-shadow:0 0 20px #ff4da6;
}

button:hover{
transform:scale(1.08);
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:blink 2s infinite;
}

@keyframes blink{
50%{opacity:.2;}
100%{opacity:1;}
}

.heart{
position:absolute;
color:#ff4da6;
font-size:22px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-100vh);
opacity:1;
}
}
</style>

</head>

<body>

<div>
<h1>Our Little Universe ❤️</h1>

<h2>Ritesh ❤️ Mahima</h2>

<p style="margin-top:20px;">
No matter where life takes us...<br>
I'll still choose you.
</p>

<button onclick="alert('Welcome, Cutie ❤️')">
Enter Our World ✨
</button>
</div>

<script>

for(let i=0;i<150;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(s);
}

for(let i=0;i<35;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*5)+"s";
h.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(h);
}

</script>

</body>
</html>
